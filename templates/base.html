<!doctype html>
<html lang="en" class="h-100">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Improv Suggestion Generator{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="{{ url_for('static', filename='css/cover.css') }}" rel="stylesheet">

    <link rel="stylesheet" href="https://use.typekit.net/evr6xtz.css">

  </head>
  <body class="d-flex h-100 text-center">

    <div class="cover-container d-flex w-200 h-100 p-3 mx-auto flex-column">
        <header class="mb-auto">
          <div>
            <!-- <h3 class="mb-0">Improv Suggestion Generator</h3> -->
            <br>
            
    </header>


    {% block content %}{% endblock %}


    <div class="button-container">
      <a class="nav-link nav-oneword oneword-light{% if request.endpoint == 'oneword' %}active{% endif %}" href="{{ url_for('oneword') }}">
          <span class="icon-circle">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-dice-1-fill" viewBox="0 0 16 16">
              <path d="M3 0a3 3 0 0 0-3 3v10a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3V3a3 3 0 0 0-3-3zm5 9.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3"/>
            </svg>
          </span> <span class="nav-text">One Word</span>
      </a>

      <a class="nav-link nav-location location-light{% if request.endpoint == 'location' %}active{% endif %}" href="{{ url_for('location') }}">
          <span class="icon-circle">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-house-fill" viewBox="0 0 16 16">
              <path d="M8.707 1.5a1 1 0 0 0-1.414 0L.646 8.146a.5.5 0 0 0 .708.708L8 2.207l6.646 6.647a.5.5 0 0 0 .708-.708L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293z"/>
              <path d="m8 3.293 6 6V13.5a1.5 1.5 0 0 1-1.5 1.5h-9A1.5 1.5 0 0 1 2 13.5V9.293z"/>
            </svg>

          </span> <span class="nav-text">Location</span>
      </a>

      <a class="nav-link nav-relationship relationship-light{% if request.endpoint == 'relationship' %}active{% endif %}" href="{{ url_for('relationship') }}">
          <span class="icon-circle">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person-heart" viewBox="0 0 16 16">
              <path d="M9 5a3 3 0 1 1-6 0 3 3 0 0 1 6 0m-9 8c0 1 1 1 1 1h10s1 0 1-1-1-4-6-4-6 3-6 4m13.5-8.09c1.387-1.425 4.855 1.07 0 4.277-4.854-3.207-1.387-5.702 0-4.276Z"/>
            </svg>
          </span> <span class="nav-text">Relationship</span>
      </a>

      <a class="nav-link nav-occupation occupation-light{% if request.endpoint == 'occupation' %}active{% endif %}" href="{{ url_for('occupation') }}">
          <span class="icon-circle">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-briefcase-fill" viewBox="0 0 16 16">
              <path d="M6.5 1A1.5 1.5 0 0 0 5 2.5V3H1.5A1.5 1.5 0 0 0 0 4.5v1.384l7.614 2.03a1.5 1.5 0 0 0 .772 0L16 5.884V4.5A1.5 1.5 0 0 0 14.5 3H11v-.5A1.5 1.5 0 0 0 9.5 1zm0 1h3a.5.5 0 0 1 .5.5V3H6v-.5a.5.5 0 0 1 .5-.5"/>
              <path d="M0 12.5A1.5 1.5 0 0 0 1.5 14h13a1.5 1.5 0 0 0 1.5-1.5V6.85L8.129 8.947a.5.5 0 0 1-.258 0L0 6.85z"/>
            </svg>
          </span> <span class="nav-text">Occupation</span>
      </a>

      <a class="nav-link nav-genre genre-light{% if request.endpoint == 'genre' %}active{% endif %}" href="{{ url_for('genre') }}">
          <span class="icon-circle">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-film" viewBox="0 0 16 16">
            <path d="M0 1a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H1a1 1 0 0 1-1-1zm4 0v6h8V1zm8 8H4v6h8zM1 1v2h2V1zm2 3H1v2h2zM1 7v2h2V7zm2 3H1v2h2zm-2 3v2h2v-2zM15 1h-2v2h2zm-2 3v2h2V4zm2 3h-2v2h2zm-2 3v2h2v-2zm2 3h-2v2h2z"/>
          </svg>
        </span> <span class="nav-text">Genre</span>
      </a>

</div>

<!-- <a href="{{ url_for('clear_session') }}" class="btn btn-secondary mt-3">Reset</a> -->

    <div class="switch-container text-center mt-4">
        <div class="form-check form-switch d-inline-flex align-items-center">
          <input class="form-check-input" type="checkbox" role="switch" id="switchCheckDefault" name="familyFriendly" value="true" {% if familyFriendly %}checked{% endif %}>
          <label class="form-check-label ms-2" for="switchCheckDefault">Family Friendly</label>
        </div>
      </div>

    <footer class="mt-auto text-black-50">
        <p>Work-in-progress by Jo Osborne. 2025. Feedback encouraged!</p>
      </footer>
</div>


    <script>
        document.getElementById("switchCheckDefault").addEventListener("change", function () {
          const isChecked = this.checked;
          fetch("{{ url_for('toggle_family_friendly') }}", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ familyFriendly: isChecked }),
          })
          .then(response => {
            if (response.ok) {
              // Fetch a new suggestion after updating the family-friendly state
              return fetch("{{ url_for('new') }}", { method: "POST" });
            } else {
              console.error("Failed to update family-friendly state.");
            }
          })
          .then(response => response.text())
          .then(newSuggestion => {
            document.getElementById("suggestion-display").innerText = newSuggestion; // Update the suggestion display
          })
          .catch(error => console.error("Error:", error));
        });
      </script>


<script>
  function generateSuggestion() {
    // Fetch a new suggestion from the server
    fetch("{{ url_for('new') }}", { method: "POST" })
      .then(response => {
            if (response.redirected) {
                // Handle redirection (e.g., to /oneword)
                window.location.href = response.url;
                return;
            }
            return response.text();
        })

      .then(newSuggestion => {
        const suggestionText = document.getElementById('suggestion-display');
        suggestionText.classList.add('animate'); // Add animation class
        setTimeout(() => {
          suggestionText.textContent = newSuggestion; // Update the suggestion text
          suggestionText.classList.remove('animate'); // Remove animation class
        }, 300); // Match the animation duration in CSS
      })
      .catch(error => console.error("Error fetching suggestion:", error));
  }
</script>

<script>
  // Add event listeners to all navigation links
  document.querySelectorAll("a.nav-link").forEach(link => {
    link.addEventListener("click", function (event) {
      event.preventDefault(); // Prevent immediate navigation

      const suggestionText = document.getElementById("suggestion-display");

      // Add the animation class to the suggestion text
      suggestionText.classList.add("animate");

      // Wait for the animation to complete, then navigate
      setTimeout(() => {
        window.location.href = this.href; // Navigate to the link's href
        }, 300); // Match the animation duration in CSS
      })
  });
</script>

<script>
  window.addEventListener('DOMContentLoaded', () => {
    const suggestionText = document.getElementById('suggestion-display');
    if (suggestionText) {
      // Trigger reflow just in case
      void suggestionText.offsetWidth;

      // Add animate-in to transition to visible
      suggestionText.classList.add('animate-in');

      // Clean up after animation completes
      setTimeout(() => {
        suggestionText.classList.remove('animate-start', 'animate-in');
      }, 300);
    }
  });
</script>


    </script>
    <!-- Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
  </body>
</html>
<!-- End of base.html -->
